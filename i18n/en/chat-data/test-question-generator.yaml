model: chatGPT | GPT's
messages:
  - role: user
    content: |
      Create test questions in GIFT format importable to Moodle, following these rules:
      - They will always be multiple-choice questions with 4 answers and only one correct one.
      - Incorrect answers will deduct half a point unless otherwise indicated.
      - All answers must be of similar length.
      - Rigor must be prioritized. The correct answer must be the only one that is correct. The others must be manifestly incorrect.
      - Questions with incorrect answers because they are not "the best definition" of those given, "the main disadvantage" or other forms of graduation must be avoided. Incorrect answers must be manifestly incorrect to avoid ambiguities and questions must be clear.
      - None of the answers should be trivially dismissible. Avoid the usual bias that the correct question is always one of 3 similar ones and there is another more absurd one.
      - The expected difficulty level is for university master's degree students unless otherwise indicated.
      - Do not include a number before the questions, they will be shuffled.
      - Material will normally be provided to generate the questions, avoid making direct references such as "according to the notes". The questions must contain by themselves all the necessary information to answer them. Students will not be able to consult the notes during the test.
      - Be careful avoiding biases such as the correct answer being the most detailed or the longest one.

      An example of the desired question format would be the following:

      ---

      // question: 91483439  name: What is stratified sampling?
      ::What is stratified sampling?::[html]What is stratified sampling?{
          ~%-50%Dividing the dataset into groups and guaranteeing that all samples of a group are in the same set (test, validation, or training).
          =Dividing the dataset into groups and taking a percentage of each stratum maintaining the original proportion of the classes
          ~%-50%Dividing the dataset into groups and increasing the presence of minority classes by duplicating or generating new samples, which can lead to a more balanced representation of classes in the test set.
          ~%-50%Dividing the dataset into groups and increasing the complexity of the model, which can result in a more robust model but also harder to interpret and adjust.
      }
  
  - role: assistant
    content: |
      // question: 67895124  name: What is a generative model in artificial intelligence?
      ::What is a generative model in artificial intelligence?::[html]What is a generative model in artificial intelligence?{
          ~%-50%An algorithm that classifies existing data into predefined categories based on features learned during training.
          ~%-50%A system that optimizes sequential decisions through interaction with an environment to maximize a cumulative reward.
          =A type of model that learns the distribution of training data and can generate new samples similar to these.
          ~%-50%An approach that reduces dimensionality of complex data by transforming them into simpler representations while preserving essential information.
      }

      // question: 38215907  name: What is the main difference between supervised and unsupervised learning?
      ::What is the main difference between supervised and unsupervised learning?::[html]What is the main difference between supervised and unsupervised learning?{
          ~%-50%Supervised learning uses neural networks while unsupervised employs traditional statistical algorithms.
          =Supervised learning uses labeled data as correct examples while unsupervised works with unlabeled data.
          ~%-50%Supervised learning requires less computational power while unsupervised needs more powerful computers.
          ~%-50%Supervised learning was developed in the 2010s while unsupervised has existed since the 1980s.
      }

      // question: 29463187  name: What is cross-validation?
      ::What is cross-validation?::[html]What is cross-validation?{
          ~%-50%A technique to reduce model complexity by removing redundant features from the dataset.
          ~%-50%A method to evaluate the performance of several models simultaneously on a single training set.
          ~%-50%A procedure that combines predictions of several models to improve the overall accuracy of the system.
          =A technique that divides the data into multiple subsets to train and validate the model, using each subset as test data once.
      } 
